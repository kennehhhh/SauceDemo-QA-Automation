[pytest]
addopts = -v --tb=short
testpaths = tests
markers =
    core: Main end-to-end SauceDemo workflows mapped to the workbook Core Workflows sheet.
    login: Login and session tests mapped to the workbook Login & Session sheet.
    unit: Unit-category tests from the workbook.
    system: System-category tests from the workbook.
    case_id(value): Exact workbook Case ID for this automated test.
    module(value): Exact workbook Module value for this automated test.
    test_user(value): Workbook Test User value actually exercised.
    actual_result(value): Default passing Actual Result text.
