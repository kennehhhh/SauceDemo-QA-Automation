[pytest]
addopts = -v --tb=short --import-mode=importlib
testpaths = tests
markers =
    core: Main end-to-end SauceDemo workflows mapped to the workbook Core Workflows sheet.
    login: Login and session tests mapped to the workbook Login & Session sheet.
    product_listing: Product Listing tests mapped to the workbook Product Listing sheet.
    product_sorting: Product Sorting tests mapped to the workbook Product Sorting sheet.
    product_detail: Product Detail tests mapped to the workbook Product Detail sheet.
    cart: Cart tests mapped to the workbook Cart sheet.
    checkout_information: Checkout Information tests mapped to the workbook Checkout Information sheet.
    checkout_overview: Checkout Overview tests mapped to the workbook Checkout Overview sheet.
    order_completion: Order Completion tests mapped to the workbook Order Completion sheet.
    menu_navigation: Menu & Navigation tests mapped to the workbook Menu & Navigation sheet.
    reset_app_state: Reset App State tests mapped to the workbook Reset App State sheet.
    access_session_control: Access & Session Control tests mapped to the workbook Access & Session Control sheet.
    footer_external_links: Footer & External Links tests mapped to the workbook Footer & External Links sheet.
    interface_responsive: Interface / Responsive tests mapped to the workbook Interface / Responsive sheet.
    unit: Unit-category tests from the workbook.
    integration: Integration-category tests from the workbook.
    system: System-category tests from the workbook.
    case_id(value): Exact workbook Case ID for this automated test.
    module(value): Exact workbook Module value for this automated test.
    test_user(value): Workbook Test User value actually exercised.
    actual_result(value): Default passing Actual Result text.
